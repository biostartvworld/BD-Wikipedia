<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD Wikipedia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <div class="logo">BD Wikipedia</div>
        <ul class="nav">
            <li><a href="#" onclick="loadPage('প্রধান_পাতা')">প্রধান পাতা</a></li>
            <li><a href="#" onclick="showCreateForm()">নতুন পাতা তৈরি করুন</a></li>
        </ul>
    </div>
    <div id="main">
        <div id="topbar">
            <input type="text" id="searchInput" placeholder="BD Wikipedia বা উইকিপিডিয়া খুঁজুন...">
            <button onclick="searchPage()">অনুসন্ধান</button>
        </div>
        <div id="content">
            <h1 id="pageTitle">স্বাগতম</h1>
            <div id="pageContent">BD Wikipedia-তে আপনাকে স্বাগতম। কিছু খুঁজতে উপরের সার্চ বার ব্যবহার করুন।</div>
        </div>
        <div id="createForm" style="display: none;">
            <h1>নতুন পাতা তৈরি</h1>
            <input type="text" id="newTitle" placeholder="পাতার শিরোনাম">
            <textarea id="newContent" placeholder="এখানে এইচটিএমএল বা টেক্সট লিখুন..."></textarea>
            <button onclick="submitPage()">সংরক্ষণ করুন</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
